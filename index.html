<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cavallino Logbook — Service & Provenance Tracker</title>
<meta name="theme-color" content="#1c1a17">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --ink:#EDE6D6; --ink-dim:#9A9183; --bg:#191714; --surface:#221F1B; --surface-2:#2A261F;
  --hairline:#3B3530; --oxblood:#6E1F24; --oxblood-bright:#8C2A30; --brass:#B08D57;
  --brass-dim:#7C6640; --good:#7A9471; --warn:#C99A4B; --danger:#A24438; --radius:4px;
}
*{box-sizing:border-box;} html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Source Sans 3',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:var(--brass);}
button{font-family:inherit;cursor:pointer;}

/* APP SHELL */
.app{max-width:960px;margin:0 auto;padding:0 20px 100px;}

/* HEADER */
.header{padding:28px 0 20px;border-bottom:1px solid var(--hairline);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
.brandmark{display:flex;align-items:center;gap:12px;}
.brandmark svg{width:32px;height:38px;}
.brandmark h1{font-size:24px;margin:0;}
.brandmark .tag{font-size:11px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase;}
.header-stats{display:flex;gap:24px;}
.stat .n{font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--brass);font-weight:700;}
.stat .l{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.1em;}

/* TABS */
.tabs{display:flex;gap:0;margin:24px 0 0;border-bottom:2px solid var(--hairline);}
.tab{background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--ink-dim);padding:12px 20px 14px;font-size:14px;letter-spacing:.05em;text-transform:uppercase;transition:all .15s;font-family:inherit;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--ink);border-bottom-color:var(--oxblood-bright);}

/* VIEWS */
.view{display:none;padding-top:28px;animation:fadeUp .2s ease;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* GARAGE */
.garage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.garage-header h2{margin:0;font-size:20px;}
.car-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.car-card{background:var(--surface);border:2px solid var(--hairline);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all .15s;position:relative;}
.car-card:hover{border-color:var(--brass-dim);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.car-card.active-car{border-color:var(--brass);}
.car-badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px;}
.car-card h3{margin:0 0 4px;font-size:20px;}
.car-card .car-sub{font-size:13px;color:var(--ink-dim);margin-bottom:16px;}
.car-card .car-mileage{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--brass);}
.car-card .car-entries{font-size:12px;color:var(--ink-dim);margin-top:4px;}
.status-pip{position:absolute;top:18px;right:18px;width:10px;height:10px;border-radius:50%;}
.pip-good{background:var(--good);}
.pip-warn{background:var(--warn);}
.pip-danger{background:var(--danger);}

.add-car-btn{border:2px dashed var(--hairline);border-radius:var(--radius);background:none;color:var(--ink-dim);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:140px;font-size:14px;transition:all .15s;width:100%;padding:22px;}
.add-car-btn:hover{border-color:var(--brass);color:var(--brass);}
.add-car-btn .plus{font-size:28px;font-weight:300;}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);padding:26px;margin-bottom:20px;}
.panel-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:22px;}
.panel-top h2{margin:0;font-size:21px;}
.panel-top .panel-meta{font-size:13px;color:var(--ink-dim);margin-top:4px;}

/* SCHEDULE ITEMS */
.sched-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--hairline);}
.sched-row:last-child{border-bottom:none;}
.sched-name{font-size:15px;font-weight:500;}
.sched-detail{font-size:12px;color:var(--ink-dim);margin-top:3px;}
.pill{display:inline-block;font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.pill-good{background:rgba(122,148,113,.15);color:var(--good);border:1px solid rgba(122,148,113,.3);}
.pill-warn{background:rgba(201,154,75,.15);color:var(--warn);border:1px solid rgba(201,154,75,.3);}
.pill-danger{background:rgba(162,68,56,.18);color:#D88C7D;border:1px solid rgba(162,68,56,.4);}
.pill-none{background:rgba(154,145,131,.1);color:var(--ink-dim);border:1px solid var(--hairline);}

/* LEDGER TABLE */
.ledger-wrap{overflow-x:auto;}
table.ledger{width:100%;border-collapse:collapse;font-size:14px;}
.ledger th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-dim);padding:8px 12px;border-bottom:1px solid var(--brass-dim);}
.ledger td{padding:13px 12px;border-bottom:1px solid var(--hairline);vertical-align:top;}
.ledger tr:hover td{background:rgba(255,255,255,.02);}
.ledger .td-cost{font-family:'JetBrains Mono',monospace;color:var(--brass);text-align:right;}
.ledger .td-odo{font-family:'JetBrains Mono',monospace;color:var(--ink-dim);}
.ledger .td-note{font-size:12px;color:var(--ink-dim);margin-top:3px;}
.empty-row td{text-align:center;color:var(--ink-dim);padding:40px;font-style:italic;}

/* ORIG GRID */
.orig-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:580px){.orig-grid{grid-template-columns:1fr;}}
.orig-item{display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);border:1px solid var(--hairline);border-radius:var(--radius);padding:10px 14px;font-size:13px;gap:10px;}
.orig-item select{background:var(--surface);border:1px solid var(--hairline);color:var(--ink);padding:5px 8px;font-size:12px;border-radius:var(--radius);font-family:inherit;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 20px;border-radius:var(--radius);font-size:13px;letter-spacing:.05em;text-transform:uppercase;border:none;transition:all .15s;font-family:inherit;cursor:pointer;}
.btn-primary{background:var(--oxblood);color:var(--ink);border:1px solid var(--oxblood-bright);}
.btn-primary:hover{background:var(--oxblood-bright);}
.btn-brass{background:var(--brass);color:#1a1714;font-weight:700;border:1px solid var(--brass);}
.btn-brass:hover{background:#c9a265;}
.btn-ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--hairline);}
.btn-ghost:hover{color:var(--ink);border-color:var(--brass-dim);}
.btn-sm{padding:7px 14px;font-size:11px;}

/* PRO GATE */
.gate{border:1px solid var(--brass-dim);border-radius:var(--radius);padding:36px;text-align:center;background:linear-gradient(160deg,rgba(176,141,87,.07),transparent);}
.gate-crown{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);margin-bottom:12px;}
.gate h3{margin:0 0 10px;font-size:22px;}
.gate p{color:var(--ink-dim);font-size:14px;max-width:440px;margin:0 auto 22px;line-height:1.6;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(8,7,6,.85);display:none;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;z-index:100;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--brass-dim);border-radius:var(--radius);padding:28px;width:100%;max-width:500px;margin:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.modal-head h2{margin:0;font-size:20px;}
.modal-close{background:none;border:none;color:var(--ink-dim);font-size:22px;cursor:pointer;line-height:1;padding:0;}
.modal-close:hover{color:var(--ink);}

/* FORM */
.field-group{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.field{flex:1;min-width:130px;display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);}
input,select,textarea{background:var(--surface-2);border:1px solid var(--hairline);color:var(--ink);padding:11px 13px;font-size:14px;font-family:inherit;border-radius:var(--radius);width:100%;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brass);border-color:transparent;}
textarea{resize:vertical;min-height:72px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--ink-dim);}
.empty h3{color:var(--ink);margin-bottom:8px;}
.empty p{font-size:14px;max-width:320px;margin:0 auto 20px;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--brass);color:var(--ink);padding:12px 22px;border-radius:var(--radius);font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{text-align:center;padding:24px;color:var(--ink-dim);font-size:11px;border-top:1px solid var(--hairline);margin-top:40px;}

@media(max-width:580px){
  .header{flex-direction:column;align-items:flex-start;}
  .tabs .tab{padding:10px 12px;font-size:12px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="brandmark">
      <svg viewBox="0 0 40 48" fill="none">
        <rect x="1" y="1" width="38" height="46" rx="2" stroke="#B08D57" stroke-width="1.5"/>
        <circle cx="20" cy="24" r="6" stroke="#B08D57" stroke-width="1.3"/>
        <line x1="20" y1="7" x2="20" y2="18" stroke="#6E1F24" stroke-width="1.5"/>
        <line x1="20" y1="30" x2="20" y2="41" stroke="#6E1F24" stroke-width="1.5"/>
        <line x1="8" y1="24" x2="14" y2="24" stroke="#6E1F24" stroke-width="1.5"/>
        <line x1="26" y1="24" x2="32" y2="24" stroke="#6E1F24" stroke-width="1.5"/>
      </svg>
      <div>
        <h1>Cavallino Logbook</h1>
        <div class="tag">Service &amp; Provenance Ledger</div>
      </div>
    </div>
    <div class="header-stats" id="headerStats"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-view="garage">🚗 Garage</button>
    <button class="tab" data-view="schedule">📋 Schedule</button>
    <button class="tab" data-view="ledger">📒 Service Log</button>
    <button class="tab" data-view="provenance">📄 Provenance</button>
  </div>

  <!-- GARAGE VIEW -->
  <div class="view active" id="view-garage">
    <div class="garage-header">
      <h2>My Garage</h2>
      <button class="btn btn-brass" onclick="openAddCar()">+ Add a Car</button>
    </div>
    <div class="car-grid" id="carGrid"></div>
  </div>

  <!-- SCHEDULE VIEW -->
  <div class="view" id="view-schedule">
    <div id="scheduleContent"></div>
  </div>

  <!-- SERVICE LOG VIEW -->
  <div class="view" id="view-ledger">
    <div id="ledgerContent"></div>
  </div>

  <!-- PROVENANCE VIEW -->
  <div class="view" id="view-provenance">
    <div id="provenanceContent"></div>
  </div>

  <footer>Cavallino Logbook — your data is stored privately on this device. Not affiliated with any automobile manufacturer.</footer>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ADD CAR MODAL -->
<div class="overlay" id="addCarOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Add a Car</h2>
      <button class="modal-close" onclick="closeOverlay('addCarOverlay')">&times;</button>
    </div>
    <div class="field-group">
      <div class="field" style="flex:2;">
        <label>Model *</label>
        <input id="f-model" placeholder="e.g. 365 GTB/4 Daytona, 308 GTSi, 488 Pista">
      </div>
      <div class="field" style="flex:1;">
        <label>Year *</label>
        <input id="f-year" placeholder="1972" inputmode="numeric" maxlength="4">
      </div>
    </div>
    <div class="field-group">
      <div class="field">
        <label>Nickname / Plate</label>
        <input id="f-nick" placeholder="e.g. Garage 1, Red Daytona">
      </div>
      <div class="field">
        <label>Current Mileage</label>
        <input id="f-mileage" placeholder="42500" inputmode="numeric">
      </div>
    </div>
    <div class="field-group">
      <div class="field">
        <label>VIN (optional)</label>
        <input id="f-vin" placeholder="ZFFXA14A000000000">
      </div>
    </div>
    <div class="field-group">
      <div class="field">
        <label>Maintenance Schedule Template</label>
        <select id="f-template">
          <option value="v12-classic">Classic V12 (365/Daytona/512/BB-era)</option>
          <option value="classic">Classic V8 (308/328/348-era)</option>
          <option value="modern-na">Modern NA (355/360/430/F12-era)</option>
          <option value="modern-turbo">Modern Turbo (488/F8/SF90-era)</option>
          <option value="generic">Generic / Other Marque</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('addCarOverlay')">Cancel</button>
      <button class="btn btn-brass" onclick="saveCar()">Save Car</button>
    </div>
  </div>
</div>

<!-- LOG SERVICE MODAL -->
<div class="overlay" id="addSvcOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Log Service Entry</h2>
      <button class="modal-close" onclick="closeOverlay('addSvcOverlay')">&times;</button>
    </div>
    <div class="field-group">
      <div class="field">
        <label>Date *</label>
        <input type="date" id="s-date">
      </div>
      <div class="field">
        <label>Odometer (miles)</label>
        <input id="s-odo" placeholder="43200" inputmode="numeric">
      </div>
    </div>
    <div class="field-group">
      <div class="field" style="flex:2;">
        <label>Service Type *</label>
        <input id="s-type" placeholder="e.g. Major service, timing belt, clutch, oil change">
      </div>
      <div class="field" style="flex:1;">
        <label>Cost (USD)</label>
        <input id="s-cost" placeholder="0" inputmode="decimal">
      </div>
    </div>
    <div class="field-group">
      <div class="field">
        <label>Shop / Specialist</label>
        <input id="s-shop" placeholder="e.g. Ferrari of Beverly Hills, Luigi's Exotic">
      </div>
    </div>
    <div class="field-group">
      <div class="field">
        <label>Notes</label>
        <textarea id="s-notes" placeholder="Parts replaced, observations, anything relevant for the next owner..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('addSvcOverlay')">Cancel</button>
      <button class="btn btn-brass" onclick="saveService()">Save Entry</button>
    </div>
  </div>
</div>

<script>
/* ====== DATA ====== */
const KEY = 'cavallino_v2';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||defaults();}catch(e){return defaults();}}
function defaults(){return {cars:[],pro:false,orig:{}};}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

let state = load();

// Seed demo data if empty
if(!state.cars.length){
  const demoId = uid();
  state.cars.push({
    id: demoId,
    model: '365 GTB/4 Daytona',
    year: '1972',
    nick: 'Red Daytona',
    mileage: 41280,
    vin: 'ZFFXA14A0000015821',
    template: 'v12-classic',
    services: [
      {id:uid(),date:'2023-04-12',odo:38400,type:'Engine oil & filter change',cost:380,shop:'Algar Ferrari, Philadelphia',notes:'Used Shell Helix 20W-50. No leaks observed.'},
      {id:uid(),date:'2022-09-05',odo:36000,type:'Valve adjustment & major service',cost:8400,shop:'Algar Ferrari, Philadelphia',notes:'All 12 cylinders adjusted. Carbs balanced. New points and plugs. Timing set to spec.'},
      {id:uid(),date:'2021-03-18',odo:33600,type:'Clutch replacement',cost:4200,shop:'Franceschi Motor, Los Angeles',notes:'OEM Fichtel & Sachs unit. Old clutch at approximately 60% wear. Flywheel resurfaced.'},
      {id:uid(),date:'2020-07-22',odo:31000,type:'Engine oil & filter change',cost:360,shop:'Algar Ferrari, Philadelphia',notes:''},
      {id:uid(),date:'2019-11-01',odo:28800,type:'Brake fluid flush & inspection',cost:520,shop:'Algar Ferrari, Philadelphia',notes:'Front pads at 40%, rears at 55%. All rotors within spec.'},
    ]
  });
  state.orig[demoId] = {
    'Engine block':'original','Cylinder heads':'original','Gearbox/Transmission':'original',
    'Differential':'original','Body panels':'original','Original paint':'replaced',
    'Interior trim':'replaced','Wheels':'original','Exhaust system':'replaced',
    'Carburetors':'original','Wiring harness':'original','Badging/Emblems':'original'
  };
  save();
}

let selectedId = state.cars[0]?.id || null;

/* ====== TEMPLATES ====== */
const TEMPLATES = {
  'v12-classic':[
    {name:'Engine oil & filter',miles:3000,months:12},
    {name:'Valve adjustment & major service',miles:12000,months:24},
    {name:'Carburetor sync & tune',miles:6000,months:12},
    {name:'Timing chain inspection',miles:24000,months:36},
    {name:'Clutch inspection',miles:20000,months:0},
    {name:'Brake fluid flush',miles:0,months:24},
  ],
  'classic':[
    {name:'Engine oil & filter',miles:5000,months:12},
    {name:'Major service (valves, belts)',miles:15000,months:24},
    {name:'Timing belt replacement',miles:30000,months:48},
    {name:'Clutch inspection',miles:25000,months:36},
    {name:'Brake fluid flush',miles:0,months:24},
  ],
  'modern-na':[
    {name:'Engine oil & filter',miles:5000,months:12},
    {name:'Major service',miles:18750,months:24},
    {name:'Timing belt replacement',miles:30000,months:48},
    {name:'Clutch (F1/manual)',miles:25000,months:0},
    {name:'Brake fluid flush',miles:0,months:24},
  ],
  'modern-turbo':[
    {name:'Engine oil & filter',miles:7500,months:12},
    {name:'Major service',miles:20000,months:24},
    {name:'Spark plugs',miles:30000,months:0},
    {name:'Brake fluid flush',miles:0,months:24},
    {name:'Carbon / turbo inspection',miles:15000,months:24},
  ],
  'generic':[
    {name:'Engine oil & filter',miles:5000,months:12},
    {name:'Major service',miles:15000,months:24},
    {name:'Timing service',miles:30000,months:48},
    {name:'Brake fluid flush',miles:0,months:24},
  ]
};

const ORIG_PARTS = ['Engine block','Cylinder heads','Gearbox/Transmission','Differential',
  'Body panels','Original paint','Interior trim','Wheels','Exhaust system',
  'Carburetors','Wiring harness','Badging/Emblems'];

/* ====== HELPERS ====== */
const fmt = n => Number(n||0).toLocaleString('en-US');
const fmtCost = n => '$'+Number(n||0).toLocaleString('en-US');
const getCar = id => state.cars.find(c=>c.id===id);

function scheduleStatus(car, item){
  const svcs = (car.services||[]).filter(s=>s.type.toLowerCase().includes(item.name.toLowerCase().split(' ')[0]));
  if(!svcs.length) return {level:'none',label:'No record',detail:'Never logged'};
  const last = svcs.sort((a,b)=>(b.odo||0)-(a.odo||0))[0];
  const odo = Number(car.mileage||0);
  if(item.miles){
    const rem = Number(last.odo||0)+item.miles-odo;
    if(rem<=0) return {level:'danger',label:'Overdue',detail:`${fmt(Math.abs(rem))} mi past due`};
    if(rem<=item.miles*.15) return {level:'warn',label:'Due soon',detail:`${fmt(rem)} mi remaining`};
    return {level:'good',label:'On track',detail:`${fmt(rem)} mi remaining`};
  }
  return {level:'good',label:'Logged',detail:`Last at ${fmt(last.odo)} mi`};
}

function carStatus(car){
  const tpl = TEMPLATES[car.template]||TEMPLATES.generic;
  let w='good';
  tpl.forEach(i=>{const s=scheduleStatus(car,i).level;if(s==='danger')w='danger';else if(s==='warn'&&w!=='danger')w='warn';});
  return w;
}

/* ====== RENDER HEADER ====== */
function renderHeader(){
  const total = state.cars.reduce((s,c)=>s+(c.services||[]).reduce((ss,e)=>ss+Number(e.cost||0),0),0);
  const entries = state.cars.reduce((s,c)=>s+(c.services||[]).length,0);
  document.getElementById('headerStats').innerHTML=`
    <div class="stat"><div class="n">${state.cars.length}</div><div class="l">Cars</div></div>
    <div class="stat"><div class="n">${entries}</div><div class="l">Entries</div></div>
    <div class="stat"><div class="n">${fmtCost(total)}</div><div class="l">Lifetime Spend</div></div>
  `;
}

/* ====== RENDER GARAGE ====== */
function renderGarage(){
  const grid = document.getElementById('carGrid');
  let html = state.cars.map(car=>{
    const st = carStatus(car);
    const pipClass = st==='danger'?'pip-danger':st==='warn'?'pip-warn':'pip-good';
    return `<div class="car-card ${car.id===selectedId?'active-car':''}" onclick="selectCar('${car.id}')">
      <div class="status-pip ${pipClass}"></div>
      <div class="car-badge">${car.nick||'—'} ${car.vin?'· …'+car.vin.slice(-6):''}</div>
      <h3>${car.year} ${car.model}</h3>
      <div class="car-sub">${car.template.replace('-',' ')}</div>
      <div class="car-mileage">${fmt(car.mileage)} mi</div>
      <div class="car-entries">${(car.services||[]).length} service record${(car.services||[]).length===1?'':'s'}</div>
    </div>`;
  }).join('');
  html += `<button class="add-car-btn" onclick="openAddCar()"><span class="plus">+</span><span>Add another car</span></button>`;
  grid.innerHTML = html;
}

/* ====== RENDER SCHEDULE ====== */
function renderSchedule(){
  const el = document.getElementById('scheduleContent');
  const car = getCar(selectedId);
  if(!car){el.innerHTML=emptyState('Select a car first','Go to the Garage tab and click a car.');return;}
  const tpl = TEMPLATES[car.template]||TEMPLATES.generic;
  const rows = tpl.map(item=>{
    const s = scheduleStatus(car,item);
    const pillClass = s.level==='danger'?'pill-danger':s.level==='warn'?'pill-warn':s.level==='good'?'pill-good':'pill-none';
    return `<div class="sched-row">
      <div>
        <div class="sched-name">${item.name}</div>
        <div class="sched-detail">Every ${item.miles?fmt(item.miles)+' mi':''}${item.miles&&item.months?' / ':''}${item.months?item.months+' mo':''} · ${s.detail}</div>
      </div>
      <span class="pill ${pillClass}">${s.label}</span>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="panel">
    <div class="panel-top">
      <div><h2>${car.year} ${car.model} — Maintenance Schedule</h2><div class="panel-meta">${car.template.replace(/-/g,' ')} template · ${fmt(car.mileage)} mi current</div></div>
      <button class="btn btn-primary btn-sm" onclick="openAddSvc()">+ Log Service</button>
    </div>
    ${rows}
  </div>`;
}

/* ====== RENDER LEDGER ====== */
function renderLedger(){
  const el = document.getElementById('ledgerContent');
  const car = getCar(selectedId);
  if(!car){el.innerHTML=emptyState('Select a car first','Go to the Garage tab and click a car.');return;}
  const entries = [...(car.services||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const rows = entries.length ? entries.map(e=>`<tr>
    <td class="mono" style="white-space:nowrap">${e.date||'—'}</td>
    <td class="td-odo">${fmt(e.odo)}</td>
    <td>${e.type}${e.notes?`<div class="td-note">${e.notes}</div>`:''}</td>
    <td>${e.shop||'—'}</td>
    <td class="td-cost">${fmtCost(e.cost)}</td>
  </tr>`).join('') : `<tr class="empty-row"><td colspan="5">No entries yet. Click "+ Log Service" to start.</td></tr>`;

  const total = entries.reduce((s,e)=>s+Number(e.cost||0),0);
  el.innerHTML=`<div class="panel">
    <div class="panel-top">
      <div><h2>${car.year} ${car.model} — Service Log</h2><div class="panel-meta">${entries.length} entr${entries.length===1?'y':'ies'} · ${fmtCost(total)} total documented spend</div></div>
      <button class="btn btn-brass btn-sm" onclick="openAddSvc()">+ Log Service</button>
    </div>
    <div class="ledger-wrap">
      <table class="ledger">
        <thead><tr><th>Date</th><th>Odometer</th><th>Service</th><th>Shop</th><th style="text-align:right">Cost</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

/* ====== RENDER PROVENANCE ====== */
function renderProvenance(){
  const el = document.getElementById('provenanceContent');
  const car = getCar(selectedId);
  if(!car){el.innerHTML=emptyState('Select a car first','Go to the Garage tab and click a car.');return;}

  if(!state.pro){
    el.innerHTML=`<div class="gate">
      <div class="gate-crown">Pro Feature</div>
      <h3>Provenance Report &amp; Originality Tracker</h3>
      <p>Build an originality checklist for all major components, then export a clean PDF that documents your car's full service history and matching-numbers status — the kind of paperwork that moves price at auction or private sale.</p>
      <button class="btn btn-brass" onclick="unlockPro()">Unlock Pro — $7/mo</button>
      <p style="margin-top:14px;font-size:12px;color:var(--ink-dim)">or <a href="#" onclick="unlockProFree(event)">try it free for testing</a></p>
    </div>`;
    return;
  }

  const orig = state.orig[car.id] = state.orig[car.id]||{};
  const grid = ORIG_PARTS.map(part=>{
    const v = orig[part]||'original';
    return `<div class="orig-item">
      <span>${part}</span>
      <select onchange="setOrig('${car.id}','${part}',this.value)">
        <option value="original" ${v==='original'?'selected':''}>Original</option>
        <option value="replaced" ${v==='replaced'?'selected':''}>Replaced (OEM)</option>
        <option value="aftermarket" ${v==='aftermarket'?'selected':''}>Aftermarket</option>
        <option value="unknown" ${v==='unknown'?'selected':''}>Unknown</option>
      </select>
    </div>`;
  }).join('');

  el.innerHTML=`<div class="panel">
    <div class="panel-top">
      <div><h2>${car.year} ${car.model} — Provenance</h2><div class="panel-meta">Originality checklist · feeds directly into PDF export</div></div>
      <button class="btn btn-brass btn-sm" onclick="exportPDF()">⬇ Export PDF Report</button>
    </div>
    <div class="orig-grid">${grid}</div>
  </div>`;
}

/* ====== PDF EXPORT ====== */
function exportPDF(){
  const car = getCar(selectedId);
  if(!car)return;
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  const orig = state.orig[car.id]||{};

  doc.setFont('times','bold');doc.setFontSize(22);
  doc.text('Provenance & Service Report',20,24);
  doc.setFont('times','normal');doc.setFontSize(13);
  doc.text(`${car.year} ${car.model}${car.nick?' — '+car.nick:''}`,20,34);
  doc.setFontSize(10);doc.setTextColor(120);
  doc.text(`VIN: ${car.vin||'Not recorded'}    Current mileage: ${fmt(car.mileage)} mi`,20,42);
  doc.text(`Report generated: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}`,20,49);
  doc.setTextColor(0);

  let y=62;
  doc.setFont('times','bold');doc.setFontSize(14);doc.text('Service History',20,y);y+=8;
  doc.setFont('times','normal');doc.setFontSize(9.5);
  const entries=[...(car.services||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!entries.length){doc.text('No service entries on record.',20,y);y+=7;}
  entries.forEach(e=>{
    if(y>270){doc.addPage();y=20;}
    doc.setFont('times','bold');doc.text(`${e.date||'—'}`,20,y);
    doc.setFont('times','normal');
    doc.text(`${fmt(e.odo)} mi  ·  ${e.type}  ·  ${e.shop||'—'}  ·  ${fmtCost(e.cost)}`,36,y);y+=5.5;
    if(e.notes){doc.setTextColor(110);doc.text(`    ${e.notes}`,20,y,{maxWidth:170});doc.setTextColor(0);y+=5.5;}
  });

  y+=8;
  if(y>255){doc.addPage();y=20;}
  doc.setFont('times','bold');doc.setFontSize(14);doc.text('Originality Checklist',20,y);y+=8;
  doc.setFont('times','normal');doc.setFontSize(9.5);
  ORIG_PARTS.forEach(p=>{
    if(y>280){doc.addPage();y=20;}
    const v=(orig[p]||'original').toUpperCase();
    doc.text(`${p}:`,20,y);doc.text(v,110,y);y+=6;
  });

  const totalSpend=entries.reduce((s,e)=>s+Number(e.cost||0),0);
  y+=6;doc.setFont('times','bold');
  doc.text(`Total documented service spend: ${fmtCost(totalSpend)}`,20,y);

  doc.save(`${car.year}-${car.model.replace(/\s+/g,'_')}-cavallino-report.pdf`);
  toast('PDF report downloaded');
}

/* ====== ORIG ====== */
function setOrig(carId,part,val){
  state.orig[carId]=state.orig[carId]||{};
  state.orig[carId][part]=val;
  save();
  toast('Originality updated');
}

/* ====== PRO ====== */
function unlockPro(){
  // Wire Stripe here in production
  alert('Stripe not yet configured — using free test unlock.');
  state.pro=true;save();renderProvenance();
}
function unlockProFree(e){e.preventDefault();state.pro=true;save();renderProvenance();}

/* ====== MODALS ====== */
function openAddCar(){
  document.getElementById('f-model').value='';
  document.getElementById('f-year').value='';
  document.getElementById('f-nick').value='';
  document.getElementById('f-mileage').value='';
  document.getElementById('f-vin').value='';
  document.getElementById('f-template').value='v12-classic';
  document.getElementById('addCarOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-model').focus(),100);
}
function openAddSvc(){
  if(!selectedId){showTab('garage');return;}
  document.getElementById('s-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('s-odo').value='';
  document.getElementById('s-type').value='';
  document.getElementById('s-cost').value='';
  document.getElementById('s-shop').value='';
  document.getElementById('s-notes').value='';
  document.getElementById('addSvcOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('s-type').focus(),100);
}
function closeOverlay(id){document.getElementById(id).classList.remove('open');}

function saveCar(){
  const model=document.getElementById('f-model').value.trim();
  const year=document.getElementById('f-year').value.trim();
  if(!model){alert('Please enter a model name.');return;}
  const car={
    id:uid(),model,year:year||'—',
    nick:document.getElementById('f-nick').value.trim(),
    mileage:Number(document.getElementById('f-mileage').value)||0,
    vin:document.getElementById('f-vin').value.trim(),
    template:document.getElementById('f-template').value,
    services:[]
  };
  state.cars.push(car);
  selectedId=car.id;
  save();closeOverlay('addCarOverlay');
  renderAll();toast(`${car.year} ${car.model} added to garage`);
}

function saveService(){
  const car=getCar(selectedId);
  if(!car)return;
  const type=document.getElementById('s-type').value.trim();
  if(!type){alert('Please enter a service type.');return;}
  const entry={
    id:uid(),
    date:document.getElementById('s-date').value,
    odo:Number(document.getElementById('s-odo').value)||Number(car.mileage)||0,
    type,
    cost:Number(document.getElementById('s-cost').value)||0,
    shop:document.getElementById('s-shop').value.trim(),
    notes:document.getElementById('s-notes').value.trim()
  };
  car.services=car.services||[];
  car.services.push(entry);
  if(entry.odo>Number(car.mileage)) car.mileage=entry.odo;
  save();closeOverlay('addSvcOverlay');
  renderAll();toast('Service entry saved');
}

/* ====== SELECT CAR ====== */
function selectCar(id){
  selectedId=id;
  renderGarage();renderSchedule();renderLedger();renderProvenance();
}

/* ====== TABS ====== */
function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+name));
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>showTab(t.dataset.view)));

/* ====== TOAST ====== */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

/* ====== EMPTY STATE ====== */
function emptyState(title,body){
  return `<div class="empty"><h3>${title}</h3><p>${body}</p></div>`;
}

/* ====== CLOSE OVERLAY ON BG CLICK ====== */
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});

/* ====== INIT ====== */
function renderAll(){renderHeader();renderGarage();renderSchedule();renderLedger();renderProvenance();}
renderAll();
</script>
</body>
</html>
