<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cavallino Logbook — Service & Provenance Tracker</title>
<meta name="theme-color" content="#1c1a17">
<meta name="description" content="A private logbook for prancing-horse owners. Track service history, maintenance intervals, and provenance — and export it all as a clean report when it's time to sell.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://js.stripe.com/v3/"></script>
<style>
:root{
  --ink:#EDE6D6;
  --ink-dim:#9A9183;
  --bg:#191714;
  --surface:#221F1B;
  --surface-2:#2A261F;
  --hairline:#3B3530;
  --oxblood:#6E1F24;
  --oxblood-bright:#8C2A30;
  --brass:#B08D57;
  --brass-dim:#7C6640;
  --good:#7A9471;
  --warn:#C99A4B;
  --danger:#A24438;
  --radius:2px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Source Sans 3',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
body::before{
  content:"";
  position:fixed; inset:0;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(176,141,87,0.05), transparent 40%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  pointer-events:none;
  z-index:0;
}
h1,h2,h3,.display{
  font-family:'Fraunces',serif;
  font-weight:500;
  letter-spacing:0.01em;
}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:var(--brass);}
button{font-family:inherit;cursor:pointer;}
.app{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 20px 80px;}

/* ===== Header / Hero ===== */
.hero{
  padding:48px 0 28px;
  border-bottom:1px solid var(--hairline);
  display:flex; justify-content:space-between; align-items:flex-end; gap:24px; flex-wrap:wrap;
}
.brandmark{display:flex;align-items:center;gap:14px;}
.crest{
  width:38px;height:46px;
  position:relative;
  flex-shrink:0;
}
.crest svg{width:100%;height:100%;}
.wordmark h1{font-size:28px;margin:0;color:var(--ink);}
.wordmark .tag{font-size:12px;color:var(--ink-dim);letter-spacing:0.14em;text-transform:uppercase;margin-top:2px;}
.odometer-strip{
  display:flex; gap:18px; align-items:baseline;
}
.odo-figure{text-align:right;}
.odo-figure .num{font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--brass);font-weight:700;}
.odo-figure .lbl{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.12em;}

/* ===== Nav tabs ===== */
.tabs{
  display:flex; gap:2px; margin:28px 0 0; border-bottom:1px solid var(--hairline);
}
.tab{
  background:none;border:none;color:var(--ink-dim);
  padding:12px 18px 14px; font-size:14px; letter-spacing:0.04em;
  border-bottom:2px solid transparent; transition:color .15s, border-color .15s;
  text-transform:uppercase;
}
.tab.active{color:var(--ink); border-bottom-color:var(--oxblood-bright);}
.tab:hover{color:var(--ink);}

.view{display:none; padding-top:32px; animation:fade .25s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* ===== Garage grid ===== */
.garage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.car-card{
  background:var(--surface); border:1px solid var(--hairline); border-radius:var(--radius);
  padding:20px; position:relative; cursor:pointer; transition:border-color .15s, transform .15s;
}
.car-card:hover{border-color:var(--brass-dim); transform:translateY(-2px);}
.car-card.selected{border-color:var(--brass);}
.car-card .plate{
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-dim);
  letter-spacing:0.1em; margin-bottom:8px;
}
.car-card h3{margin:0 0 4px;font-size:19px;color:var(--ink);}
.car-card .sub{font-size:13px;color:var(--ink-dim);}
.car-card .mileage{margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--brass);}
.car-card .status-dot{
  position:absolute; top:20px; right:20px; width:9px; height:9px; border-radius:50%;
}
.status-good{background:var(--good);}
.status-warn{background:var(--warn);}
.status-danger{background:var(--danger);}

.add-card{
  border:1px dashed var(--hairline); border-radius:var(--radius); padding:20px;
  display:flex; align-items:center; justify-content:center; color:var(--ink-dim);
  font-size:14px; min-height:120px; background:transparent;
}
.add-card:hover{color:var(--brass); border-color:var(--brass-dim);}

/* ===== Forms ===== */
.field-row{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px;}
.field{flex:1; min-width:140px; display:flex; flex-direction:column; gap:6px;}
.field label{font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-dim);}
input,select,textarea{
  background:var(--surface-2); border:1px solid var(--hairline); color:var(--ink);
  padding:10px 12px; font-size:14px; font-family:inherit; border-radius:var(--radius);
}
input:focus,select:focus,textarea:focus{outline:1px solid var(--brass); border-color:var(--brass);}
textarea{resize:vertical; min-height:60px;}
.btn{
  background:var(--oxblood); color:var(--ink); border:1px solid var(--oxblood-bright);
  padding:11px 20px; font-size:13px; text-transform:uppercase; letter-spacing:0.08em;
  border-radius:var(--radius); transition:background .15s;
}
.btn:hover{background:var(--oxblood-bright);}
.btn.ghost{background:transparent; border:1px solid var(--hairline); color:var(--ink-dim);}
.btn.ghost:hover{color:var(--ink); border-color:var(--brass-dim);}
.btn.brass{background:var(--brass); border-color:var(--brass); color:#1c1a17; font-weight:600;}
.btn.brass:hover{background:#c39d62;}
.btn.small{padding:7px 12px; font-size:11px;}

/* ===== Detail panel ===== */
.panel{background:var(--surface); border:1px solid var(--hairline); border-radius:var(--radius); padding:24px; margin-bottom:20px;}
.panel-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; flex-wrap:wrap; gap:12px;}
.panel-head h2{margin:0; font-size:22px;}
.panel-head .meta{font-size:13px; color:var(--ink-dim); margin-top:4px;}
.btn-row{display:flex; gap:8px; flex-wrap:wrap;}

/* ===== Schedule list ===== */
.sched-item{
  display:flex; justify-content:space-between; align-items:center; gap:16px;
  padding:13px 0; border-bottom:1px solid var(--hairline);
}
.sched-item:last-child{border-bottom:none;}
.sched-item .name{font-size:14px;}
.sched-item .interval{font-size:12px; color:var(--ink-dim); margin-top:2px;}
.pill{font-size:11px; padding:3px 9px; border-radius:20px; font-family:'JetBrains Mono',monospace; white-space:nowrap;}
.pill.good{background:rgba(122,148,113,0.15); color:var(--good); border:1px solid rgba(122,148,113,0.3);}
.pill.warn{background:rgba(201,154,75,0.15); color:var(--warn); border:1px solid rgba(201,154,75,0.3);}
.pill.danger{background:rgba(162,68,56,0.18); color:#D88C7D; border:1px solid rgba(162,68,56,0.4);}

/* ===== Ledger table ===== */
.ledger{width:100%; border-collapse:collapse; font-size:13.5px;}
.ledger th{
  text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em;
  color:var(--ink-dim); padding:8px 10px; border-bottom:1px solid var(--brass-dim);
}
.ledger td{padding:11px 10px; border-bottom:1px solid var(--hairline); vertical-align:top;}
.ledger tr:hover td{background:rgba(255,255,255,0.015);}
.ledger .cost{font-family:'JetBrains Mono',monospace; color:var(--brass); text-align:right;}
.ledger .odo{font-family:'JetBrains Mono',monospace; color:var(--ink-dim);}
.empty-row td{text-align:center; color:var(--ink-dim); padding:36px 10px; font-style:italic;}

/* ===== Originality checklist ===== */
.orig-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.orig-item{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--surface-2); border:1px solid var(--hairline); border-radius:var(--radius);
  padding:10px 12px; font-size:13px;
}
.orig-item select{padding:5px 8px; font-size:12px;}

/* ===== Pro gate ===== */
.gate{
  position:relative; border:1px solid var(--brass-dim); border-radius:var(--radius);
  padding:26px; text-align:center; background:linear-gradient(160deg, rgba(176,141,87,0.07), transparent);
}
.gate .crown{font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass); margin-bottom:10px;}
.gate h3{margin:0 0 8px; font-size:19px;}
.gate p{color:var(--ink-dim); font-size:13.5px; max-width:440px; margin:0 auto 18px;}

/* ===== Empty state ===== */
.empty-state{text-align:center; padding:70px 20px; color:var(--ink-dim);}
.empty-state h3{color:var(--ink); margin-bottom:8px;}

/* ===== Modal ===== */
.modal-bg{
  position:fixed; inset:0; background:rgba(10,9,7,0.78); display:none;
  align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; z-index:50;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--surface); border:1px solid var(--brass-dim); border-radius:var(--radius);
  padding:26px; width:100%; max-width:520px; margin-top:20px;
}
.modal h2{margin-top:0; font-size:20px;}
.modal-close{float:right; background:none; border:none; color:var(--ink-dim); font-size:18px;}

footer{text-align:center; padding:30px 0; color:var(--ink-dim); font-size:11.5px; border-top:1px solid var(--hairline); margin-top:40px;}

@media (max-width:600px){
  .hero{flex-direction:column; align-items:flex-start;}
  .orig-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app">

  <div class="hero">
    <div class="brandmark">
      <div class="crest">
        <svg viewBox="0 0 40 48" fill="none">
          <rect x="1" y="1" width="38" height="46" rx="1" stroke="#B08D57" stroke-width="1.2"/>
          <line x1="20" y1="6" x2="20" y2="42" stroke="#3B3530" stroke-width="1"/>
          <circle cx="20" cy="24" r="5.5" stroke="#B08D57" stroke-width="1.2"/>
          <path d="M20 18 L20 30 M14 24 L26 24" stroke="#6E1F24" stroke-width="1.3"/>
        </svg>
      </div>
      <div class="wordmark">
        <h1>Cavallino Logbook</h1>
        <div class="tag">Service &amp; Provenance Ledger</div>
      </div>
    </div>
    <div class="odometer-strip" id="heroStats"></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-view="garage">Garage</button>
    <button class="tab" data-view="schedule">Schedule</button>
    <button class="tab" data-view="ledger">Service Log</button>
    <button class="tab" data-view="provenance">Provenance</button>
  </div>

  <!-- GARAGE -->
  <div class="view active" id="view-garage">
    <div class="garage-grid" id="garageGrid"></div>
  </div>

  <!-- SCHEDULE -->
  <div class="view" id="view-schedule">
    <div id="scheduleContent"></div>
  </div>

  <!-- LEDGER -->
  <div class="view" id="view-ledger">
    <div id="ledgerContent"></div>
  </div>

  <!-- PROVENANCE -->
  <div class="view" id="view-provenance">
    <div id="provenanceContent"></div>
  </div>

  <footer>Cavallino Logbook — your data lives on this device, in your browser. Export often. Not affiliated with any marque.</footer>
</div>

<!-- Add/Edit Car Modal -->
<div class="modal-bg" id="carModalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeCarModal()">&times;</button>
    <h2 id="carModalTitle">Add a Car</h2>
    <div class="field-row">
      <div class="field"><label>Model</label><input id="cf-model" placeholder="e.g. 308 GTSi, F355, 488 Pista"></div>
      <div class="field"><label>Year</label><input id="cf-year" placeholder="1986" inputmode="numeric"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Nickname / Plate</label><input id="cf-nick" placeholder="Garage 1, or plate"></div>
      <div class="field"><label>Current Mileage</label><input id="cf-mileage" placeholder="42500" inputmode="numeric"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>VIN</label><input id="cf-vin" placeholder="Optional"></div>
      <div class="field"><label>Schedule Template</label>
        <select id="cf-template">
          <option value="classic">Classic V8 (308/328/348-era)</option>
          <option value="v12-classic">Classic V12 (Daytona/365/512-era)</option>
          <option value="modern-na">Modern NA (355/360/430/F12-era)</option>
          <option value="modern-turbo">Modern Turbo (488/F8/SF90-era)</option>
          <option value="generic">Generic / Other Marque</option>
        </select>
      </div>
    </div>
    <div class="btn-row" style="margin-top:6px;justify-content:flex-end;">
      <button class="btn ghost" onclick="closeCarModal()">Cancel</button>
      <button class="btn brass" onclick="saveCar()">Save Car</button>
    </div>
  </div>
</div>

<!-- Add Service Entry Modal -->
<div class="modal-bg" id="svcModalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeSvcModal()">&times;</button>
    <h2>Log Service Entry</h2>
    <div class="field-row">
      <div class="field"><label>Date</label><input type="date" id="sf-date"></div>
      <div class="field"><label>Odometer</label><input id="sf-odo" placeholder="43120" inputmode="numeric"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Service Type</label><input id="sf-type" placeholder="Major service, belts, clutch..."></div>
      <div class="field"><label>Cost (USD)</label><input id="sf-cost" placeholder="0" inputmode="decimal"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Shop / Mechanic</label><input id="sf-shop" placeholder="Specialist name"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Notes</label><textarea id="sf-notes" placeholder="Parts used, observations, anything for the next owner to know..."></textarea></div>
    </div>
    <div class="btn-row" style="justify-content:flex-end;">
      <button class="btn ghost" onclick="closeSvcModal()">Cancel</button>
      <button class="btn brass" onclick="saveService()">Add Entry</button>
    </div>
  </div>
</div>

<script>
/* ===================== DATA LAYER ===================== */
const STORE_KEY = 'cavallino_logbook_v1';

function loadData(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { cars: [], proUnlocked: false, originality: {} };
}
function saveData(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

let state = loadData();
let selectedCarId = state.cars[0]?.id || null;
let activeView = 'garage';

const TEMPLATES = {
  'classic': [
    {name:'Engine oil & filter', miles:5000, months:12},
    {name:'Major service (valves, belts)', miles:15000, months:24},
    {name:'Timing belt replacement', miles:30000, months:48},
    {name:'Clutch inspection', miles:25000, months:36},
    {name:'Brake fluid flush', miles:0, months:24},
  ],
  'v12-classic': [
    {name:'Engine oil & filter', miles:3000, months:12},
    {name:'Valve adjustment service', miles:12000, months:24},
    {name:'Timing chain/belt inspection', miles:24000, months:36},
    {name:'Carburetor sync & tune', miles:6000, months:12},
    {name:'Brake & clutch fluid flush', miles:0, months:24},
  ],
  'modern-na': [
    {name:'Engine oil & filter', miles:5000, months:12},
    {name:'Major service', miles:18750, months:24},
    {name:'Timing belt replacement', miles:30000, months:48},
    {name:'Clutch (if manual/F1)', miles:25000, months:0},
    {name:'Brake fluid flush', miles:0, months:24},
  ],
  'modern-turbo': [
    {name:'Engine oil & filter', miles:7500, months:12},
    {name:'Major service', miles:20000, months:24},
    {name:'Spark plugs', miles:30000, months:0},
    {name:'Brake fluid flush', miles:0, months:24},
    {name:'Carbon/turbo inspection', miles:15000, months:24},
  ],
  'generic': [
    {name:'Engine oil & filter', miles:5000, months:12},
    {name:'Major service', miles:15000, months:24},
    {name:'Timing service', miles:30000, months:48},
    {name:'Brake fluid flush', miles:0, months:24},
  ],
};

const ORIGINALITY_PARTS = [
  'Engine block','Cylinder heads','Gearbox/Transmission','Differential',
  'Body panels (steel/alloy)','Original paint','Interior trim','Wheels',
  'Exhaust system','Carburetors/Injection','Wiring harness','Badging/Emblems'
];

/* ===================== HELPERS ===================== */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtMiles(n){ return Number(n||0).toLocaleString('en-US'); }
function fmtCost(n){ return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0}); }
function getCar(id){ return state.cars.find(c=>c.id===id); }

function lastServiceFor(car, itemName){
  const entries = (car.services||[]).filter(s=>s.type.toLowerCase().includes(itemName.toLowerCase().split(' ')[0]));
  if(!entries.length) return null;
  return entries.sort((a,b)=> (b.odo||0)-(a.odo||0))[0];
}

function statusForItem(car, item){
  const last = lastServiceFor(car, item.name);
  const currentOdo = Number(car.mileage||0);
  if(!last){
    return {level:'warn', label:'No record', detail:'Never logged'};
  }
  if(item.miles){
    const due = Number(last.odo||0) + item.miles;
    const remaining = due - currentOdo;
    if(remaining <= 0) return {level:'danger', label:'Overdue', detail:`${fmtMiles(Math.abs(remaining))} mi past due`};
    if(remaining <= item.miles*0.15) return {level:'warn', label:'Due soon', detail:`${fmtMiles(remaining)} mi remaining`};
    return {level:'good', label:'On track', detail:`${fmtMiles(remaining)} mi remaining`};
  }
  return {level:'good', label:'Logged', detail:`Last at ${fmtMiles(last.odo)} mi`};
}

function carOverallStatus(car){
  const tpl = TEMPLATES[car.template]||TEMPLATES.generic;
  let worst = 'good';
  tpl.forEach(item=>{
    const s = statusForItem(car,item).level;
    if(s==='danger') worst='danger';
    else if(s==='warn' && worst!=='danger') worst='warn';
  });
  return worst;
}

/* ===================== RENDER: HERO ===================== */
function renderHero(){
  const totalCars = state.cars.length;
  const totalSpend = state.cars.reduce((sum,c)=> sum + (c.services||[]).reduce((s,e)=>s+Number(e.cost||0),0), 0);
  const totalEntries = state.cars.reduce((sum,c)=> sum + (c.services||[]).length, 0);
  document.getElementById('heroStats').innerHTML = `
    <div class="odo-figure"><div class="num">${totalCars}</div><div class="lbl">In Garage</div></div>
    <div class="odo-figure"><div class="num">${totalEntries}</div><div class="lbl">Log Entries</div></div>
    <div class="odo-figure"><div class="num">${fmtCost(totalSpend)}</div><div class="lbl">Lifetime Spend</div></div>
  `;
}

/* ===================== RENDER: GARAGE ===================== */
function renderGarage(){
  const grid = document.getElementById('garageGrid');
  if(!state.cars.length){
    grid.innerHTML = `<div class="add-card" onclick="openCarModal()" style="grid-column:1/-1;min-height:160px;cursor:pointer;">+ Add your first car</div>`;
    return;
  }
  let html = '';
  state.cars.forEach(car=>{
    const status = carOverallStatus(car);
    html += `
      <div class="car-card ${car.id===selectedCarId?'selected':''}" onclick="selectCar('${car.id}')">
        <div class="status-dot status-${status}"></div>
        <div class="plate">${car.nick || 'UNNAMED'} ${car.vin ? '· VIN '+car.vin.slice(-6):''}</div>
        <h3>${car.year} ${car.model}</h3>
        <div class="sub">${(car.services||[]).length} service record${(car.services||[]).length===1?'':'s'}</div>
        <div class="mileage">${fmtMiles(car.mileage)} mi</div>
      </div>`;
  });
  html += `<button class="add-card" onclick="openCarModal()">+ Add another car</button>`;
  grid.innerHTML = html;
}

function selectCar(id){
  selectedCarId = id;
  renderGarage();
  renderSchedule();
  renderLedger();
  renderProvenance();
}

/* ===================== RENDER: SCHEDULE ===================== */
function renderSchedule(){
  const el = document.getElementById('scheduleContent');
  const car = getCar(selectedCarId);
  if(!car){ el.innerHTML = emptyState('Select a car', 'Add a car in the Garage tab to see its maintenance schedule.'); return; }
  const tpl = TEMPLATES[car.template]||TEMPLATES.generic;
  let rows = '';
  tpl.forEach(item=>{
    const s = statusForItem(car,item);
    rows += `
      <div class="sched-item">
        <div>
          <div class="name">${item.name}</div>
          <div class="interval">Every ${item.miles?fmtMiles(item.miles)+' mi':''}${item.miles&&item.months?' / ':''}${item.months?item.months+' mo':''} · ${s.detail}</div>
        </div>
        <span class="pill ${s.level}">${s.label}</span>
      </div>`;
  });
  el.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>${car.year} ${car.model} — Schedule</h2>
          <div class="meta">Template: ${car.template.replace('-',' ')} · ${fmtMiles(car.mileage)} mi current</div>
        </div>
        <button class="btn small ghost" onclick="openSvcModal()">+ Log Service</button>
      </div>
      ${rows}
    </div>
  `;
}

/* ===================== RENDER: LEDGER ===================== */
function renderLedger(){
  const el = document.getElementById('ledgerContent');
  const car = getCar(selectedCarId);
  if(!car){ el.innerHTML = emptyState('Select a car', 'Add a car to start logging service history.'); return; }
  const entries = [...(car.services||[])].sort((a,b)=> new Date(b.date)-new Date(a.date));
  let rows = entries.length ? '' : `<tr class="empty-row"><td colspan="5">No entries yet — every wrench turn starts here.</td></tr>`;
  entries.forEach(e=>{
    rows += `<tr>
      <td class="mono">${e.date||'—'}</td>
      <td class="odo">${fmtMiles(e.odo)} mi</td>
      <td>${e.type}${e.notes?`<div style="color:var(--ink-dim);font-size:12px;margin-top:3px;">${e.notes}</div>`:''}</td>
      <td>${e.shop||'—'}</td>
      <td class="cost">${fmtCost(e.cost)}</td>
    </tr>`;
  });
  el.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>${car.year} ${car.model} — Service Log</h2>
          <div class="meta">${entries.length} entr${entries.length===1?'y':'ies'} on record</div>
        </div>
        <button class="btn small brass" onclick="openSvcModal()">+ Log Service</button>
      </div>
      <table class="ledger">
        <thead><tr><th>Date</th><th>Odometer</th><th>Service</th><th>Shop</th><th style="text-align:right;">Cost</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

/* ===================== RENDER: PROVENANCE ===================== */
function renderProvenance(){
  const el = document.getElementById('provenanceContent');
  const car = getCar(selectedCarId);
  if(!car){ el.innerHTML = emptyState('Select a car', 'Provenance reports are built from a car\\'s service history and originality checklist.'); return; }

  if(!state.proUnlocked){
    el.innerHTML = `
      <div class="gate">
        <div class="crown">Pro Feature</div>
        <h3>Provenance Reports &amp; Originality Tracking</h3>
        <p>Generate a clean, exportable PDF of this car's full service history, originality checklist, and ownership notes — the kind of documentation that moves the needle at sale or auction.</p>
        <button class="btn brass" onclick="unlockPro()">Unlock Pro — $7/mo</button>
      </div>
    `;
    return;
  }

  const orig = state.originality[car.id] = state.originality[car.id] || {};
  let origRows = '';
  ORIGINALITY_PARTS.forEach(part=>{
    const val = orig[part] || 'original';
    origRows += `
      <div class="orig-item">
        <span>${part}</span>
        <select onchange="setOriginality('${car.id}','${part}',this.value)">
          <option value="original" ${val==='original'?'selected':''}>Original</option>
          <option value="replaced" ${val==='replaced'?'selected':''}>Replaced (OEM)</option>
          <option value="aftermarket" ${val==='aftermarket'?'selected':''}>Aftermarket</option>
          <option value="unknown" ${val==='unknown'?'selected':''}>Unknown</option>
        </select>
      </div>`;
  });

  el.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>${car.year} ${car.model} — Provenance</h2>
          <div class="meta">Originality status feeds directly into the exported report</div>
        </div>
        <button class="btn small brass" onclick="exportProvenance()">Export PDF Report</button>
      </div>
      <div class="orig-grid">${origRows}</div>
    </div>
  `;
}

function setOriginality(carId, part, value){
  state.originality[carId] = state.originality[carId] || {};
  state.originality[carId][part] = value;
  saveData();
}

/* ===================== STRIPE ===================== */
// SETUP: 1) Replace STRIPE_PUBLIC_KEY below with your live/test publishable key.
// 2) Replace CHECKOUT_ENDPOINT with your backend endpoint that creates a Stripe
//    Checkout Session and returns { id: session.id }. Stripe requires a server
//    (a tiny Netlify/Vercel function works fine) because the secret key can
//    never live in client-side code. A ready-to-deploy Netlify function example
//    is in /server/create-checkout-session.js alongside this file.
// 3) Replace SUCCESS_PARAM check below if you customize the redirect URL.
const STRIPE_PUBLIC_KEY = 'pk_test_REPLACE_ME';
const CHECKOUT_ENDPOINT = '/.netlify/functions/create-checkout-session';

async function unlockPro(){
  if(state.proUnlocked){ return; }
  try{
    if(typeof Stripe === 'undefined' || STRIPE_PUBLIC_KEY.includes('REPLACE_ME')){
      // Fallback for local testing / before Stripe is wired up.
      if(confirm('Stripe isn\\'t configured yet. Unlock Pro features locally for testing?')){
        state.proUnlocked = true; saveData(); renderProvenance();
      }
      return;
    }
    const stripe = Stripe(STRIPE_PUBLIC_KEY);
    const res = await fetch(CHECKOUT_ENDPOINT, { method:'POST' });
    const session = await res.json();
    stripe.redirectToCheckout({ sessionId: session.id });
  }catch(err){
    console.error('Stripe checkout failed', err);
    alert('Could not start checkout. Please try again in a moment.');
  }
}

// On return from a successful Stripe redirect (?pro=success), unlock Pro.
if(new URLSearchParams(window.location.search).get('pro') === 'success'){
  state.proUnlocked = true; saveData();
}

/* ===================== SERVICE WORKER ===================== */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

/* ===================== PDF EXPORT ===================== */
function exportProvenance(){
  const car = getCar(selectedCarId);
  if(!car) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const orig = state.originality[car.id] || {};

  doc.setFont('times','bold'); doc.setFontSize(20);
  doc.text('Provenance & Service Report', 20, 22);
  doc.setFont('times','normal'); doc.setFontSize(12);
  doc.text(`${car.year} ${car.model}`, 20, 32);
  doc.setFontSize(10);
  doc.text(`VIN: ${car.vin||'Not recorded'}    Current Mileage: ${fmtMiles(car.mileage)} mi`, 20, 39);
  doc.text(`Report generated: ${new Date().toLocaleDateString()}`, 20, 45);

  let y = 56;
  doc.setFont('times','bold'); doc.setFontSize(13);
  doc.text('Service History', 20, y); y+=7;
  doc.setFont('times','normal'); doc.setFontSize(9.5);
  const entries = [...(car.services||[])].sort((a,b)=> new Date(a.date)-new Date(b.date));
  if(!entries.length){ doc.text('No service entries on record.', 20, y); y+=7; }
  entries.forEach(e=>{
    if(y > 270){ doc.addPage(); y = 20; }
    const line = `${e.date||'—'}  |  ${fmtMiles(e.odo)} mi  |  ${e.type}  |  ${e.shop||'—'}  |  ${fmtCost(e.cost)}`;
    doc.text(line, 20, y); y+=6;
    if(e.notes){ doc.setTextColor(110); doc.text('   '+e.notes, 20, y, {maxWidth:170}); doc.setTextColor(0); y+=6; }
  });

  y+=6;
  if(y > 250){ doc.addPage(); y = 20; }
  doc.setFont('times','bold'); doc.setFontSize(13);
  doc.text('Originality Checklist', 20, y); y+=7;
  doc.setFont('times','normal'); doc.setFontSize(9.5);
  ORIGINALITY_PARTS.forEach(part=>{
    if(y > 280){ doc.addPage(); y = 20; }
    doc.text(`${part}: ${(orig[part]||'original').toUpperCase()}`, 20, y); y+=6;
  });

  doc.save(`${car.year}-${car.model.replace(/\s+/g,'_')}-provenance-report.pdf`);
}

/* ===================== EMPTY STATE ===================== */
function emptyState(title, body){
  return `<div class="empty-state"><h3>${title}</h3><p>${body}</p></div>`;
}

/* ===================== MODALS ===================== */
function openCarModal(){
  document.getElementById('cf-model').value='';
  document.getElementById('cf-year').value='';
  document.getElementById('cf-nick').value='';
  document.getElementById('cf-mileage').value='';
  document.getElementById('cf-vin').value='';
  document.getElementById('cf-template').value='modern-na';
  document.getElementById('carModalBg').classList.add('open');
}
function closeCarModal(){ document.getElementById('carModalBg').classList.remove('open'); }

function saveCar(){
  const model = document.getElementById('cf-model').value.trim();
  if(!model){ alert('Enter a model name.'); return; }
  const car = {
    id: uid(),
    model,
    year: document.getElementById('cf-year').value.trim() || '—',
    nick: document.getElementById('cf-nick').value.trim(),
    mileage: Number(document.getElementById('cf-mileage').value)||0,
    vin: document.getElementById('cf-vin').value.trim(),
    template: document.getElementById('cf-template').value,
    services: []
  };
  state.cars.push(car);
  selectedCarId = car.id;
  saveData();
  closeCarModal();
  renderAll();
}

function openSvcModal(){
  if(!selectedCarId){ alert('Select or add a car first.'); return; }
  document.getElementById('sf-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('sf-odo').value='';
  document.getElementById('sf-type').value='';
  document.getElementById('sf-cost').value='';
  document.getElementById('sf-shop').value='';
  document.getElementById('sf-notes').value='';
  document.getElementById('svcModalBg').classList.add('open');
}
function closeSvcModal(){ document.getElementById('svcModalBg').classList.remove('open'); }

function saveService(){
  const car = getCar(selectedCarId);
  if(!car) return;
  const type = document.getElementById('sf-type').value.trim();
  if(!type){ alert('Enter a service type.'); return; }
  const entry = {
    id: uid(),
    date: document.getElementById('sf-date').value,
    odo: Number(document.getElementById('sf-odo').value)||car.mileage,
    type,
    cost: Number(document.getElementById('sf-cost').value)||0,
    shop: document.getElementById('sf-shop').value.trim(),
    notes: document.getElementById('sf-notes').value.trim()
  };
  car.services = car.services || [];
  car.services.push(entry);
  if(entry.odo > car.mileage) car.mileage = entry.odo;
  saveData();
  closeSvcModal();
  renderAll();
}

/* ===================== TABS ===================== */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    tab.classList.add('active');
    activeView = tab.dataset.view;
    document.getElementById('view-'+activeView).classList.add('active');
  });
});

/* ===================== INIT ===================== */
function renderAll(){
  renderHero();
  renderGarage();
  renderSchedule();
  renderLedger();
  renderProvenance();
}
renderAll();
</script>
